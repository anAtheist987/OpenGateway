# Knowledge Demo — config
#
# 启动一个最简 HTTP 代理，指向 httpbin.org，
# 并开启 Evolutionary Memory（工作记忆容量 50 条）。
# KDN 集成默认关闭；取消注释 kdnEndpoint 行即可启用。

config:
  adminAddr: "localhost:15000"
  statsAddr: "0.0.0.0:15020"
  readinessAddr: "0.0.0.0:15021"
  knowledge:
    workingMemoryCapacity: 50
    # kdnEndpoint: "http://localhost:9000"

binds:
  - port: 3000
    listeners:
      - routes:
          - matches:
              - path:
                  pathPrefix: "/"
            backends:
              - host: "httpbin.org:80"
