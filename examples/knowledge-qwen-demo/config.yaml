# Knowledge + Qwen Demo — config
#
# 场景：多路由 AI 网关，通过 DashScope（阿里云）OpenAI 兼容接口调用 Qwen 模型。
#
# 路由设计：
#   /v1/chat/completions  → 主力路由：qwen-plus，带 PII 过滤 + 速率限制
#   /v1/fast/*            → 快速路由：qwen-turbo，低延迟，无过滤
#   /v1/safe/*            → 安全路由：qwen-plus，严格 prompt 审查
#
# 演进式记忆：
#   - 工作记忆容量 200 条
#   - 每条请求的模型名、路由、延迟、成功/失败均被自动捕获
#   - 通过 Admin API 可查询各路由的 EWMA 延迟和成功率
#
# 使用前请设置环境变量：
#   export DASHSCOPE_API_KEY="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#
# DashScope OpenAI 兼容端点：
#   https://dashscope.aliyuncs.com/compatible-mode/v1

config:
  adminAddr: "localhost:15000"
  statsAddr: "0.0.0.0:15020"
  readinessAddr: "0.0.0.0:15021"
  knowledge:
    workingMemoryCapacity: 200
    # kdnEndpoint: "http://kdn-service:9000"  # 启用 KDN 协同推理加速
  # Task Router 配置 — 智能任务路由和分解
  taskRouter:
    baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    plannerModel: "qwen-plus"
    apiKey: $DASHSCOPE_API_KEY
    complexityThreshold: 0.6
    maxSubtasks: 8
    routingStrategy: "llm"
    # embeddingModel: "text-embedding-v3"  # 当 routingStrategy 为 vector/llmEnhancedVector/vectorPrefilterLlm 时必需

binds:
  - port: 3000
    listeners:
      - routes:

          # ── 路由 1：主力路由 /v1/chat/completions ──────────────────────────
          # 使用 qwen-plus，带 PII 过滤（拒绝含手机号/身份证的请求）
          # 和速率限制（每分钟 20 次）
          - matches:
              - path:
                  exact: "/v1/chat/completions"
            backends:
              - ai:
                  name: qwen-plus
                  provider:
                    openAI:
                      model: qwen-plus
                  hostOverride: "dashscope.aliyuncs.com:443"
                  pathOverride: "/compatible-mode/v1"
                  policies:
                    backendAuth:
                      key: $DASHSCOPE_API_KEY
                    backendTLS: {}
            policies:
              localRateLimit:
                - maxTokens: 20
                  tokensPerFill: 20
                  fillInterval: 60s
              ai:
                promptGuard:
                  request:
                    - regex:
                        action: reject
                        rules:
                          # 中国大陆手机号
                          - pattern: "1[3-9]\\d{9}"
                          # 中国居民身份证号
                          - pattern: "[1-9]\\d{5}(18|19|20)\\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\\d|3[01])\\d{3}[\\dXx]"
                      rejection:
                        status: 400
                        headers:
                          set:
                            content-type: "application/json"
                        body: |
                          {
                            "error": {
                              "message": "请求被拒绝：包含个人敏感信息（手机号或身份证号）",
                              "type": "invalid_request_error",
                              "code": "pii_detected"
                            }
                          }

          # ── 路由 2：快速路由 /v1/fast/* ────────────────────────────────────
          # 使用 qwen-turbo，低延迟，无内容过滤，适合高频简单任务
          - matches:
              - path:
                  pathPrefix: "/v1/fast/"
            backends:
              - ai:
                  name: qwen-turbo
                  provider:
                    openAI:
                      model: qwen-turbo
                  hostOverride: "dashscope.aliyuncs.com:443"
                  pathOverride: "/compatible-mode/v1"
                  policies:
                    backendAuth:
                      key: $DASHSCOPE_API_KEY
                    backendTLS: {}
            policies:
              timeout:
                requestTimeout: 10s

          # ── 路由 3：安全路由 /v1/safe/* ────────────────────────────────────
          # 使用 qwen-plus，严格审查：拒绝含越狱关键词的请求，
          # 同时过滤响应中的邮箱地址
          - matches:
              - path:
                  pathPrefix: "/v1/safe/"
            backends:
              - ai:
                  name: qwen-plus-safe
                  provider:
                    openAI:
                      model: qwen-plus
                  hostOverride: "dashscope.aliyuncs.com:443"
                  pathOverride: "/compatible-mode/v1"
                  policies:
                    backendAuth:
                      key: $DASHSCOPE_API_KEY
                    backendTLS: {}
            policies:
              ai:
                promptGuard:
                  request:
                    - regex:
                        action: reject
                        rules:
                          - pattern: "(?i)(ignore previous|ignore all|jailbreak|DAN mode|pretend you are|you are now)"
                          - pattern: "(?i)(忽略之前|忘记你的指令|你现在是|扮演一个没有限制)"
                      rejection:
                        status: 400
                        headers:
                          set:
                            content-type: "application/json"
                        body: |
                          {
                            "error": {
                              "message": "请求被拒绝：检测到越狱尝试",
                              "type": "invalid_request_error",
                              "code": "jailbreak_detected"
                            }
                          }
                  response:
                    - regex:
                        action: mask
                        rules:
                          - builtin: email
